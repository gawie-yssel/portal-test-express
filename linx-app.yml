# env variables exposed to the Linx Portal
env:
  - name: PORT
    default: "3000"

  # Postgres connectivity test (set DATABASE_URL, or the discrete PG* vars)
  - name: DATABASE_URL
  - name: PGHOST
  - name: PGPORT
    default: "5432"
  - name: PGUSER
  - name: PGPASSWORD
  - name: PGDATABASE
  - name: PGSSL
    default: "false"

  # S3 connectivity test
  - name: AWS_REGION
  - name: AWS_ACCESS_KEY_ID
  - name: AWS_SECRET_ACCESS_KEY
  - name: S3_BUCKET
  - name: S3_ENDPOINT

  # Disk connectivity test  
  - name: DISK_PATH

  # Observability
  - name: LOG_LEVEL
    default: "info"
  - name: LOG_SQL
    default: "false"
  - name: OTEL_SERVICE_NAME
    default: "portal-test-express"
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
  - name: OTEL_SDK_DISABLED
    default: "false"

# Linx Portal configuration for the application
port:
  default: 3000
  linked_env_var: PORT
